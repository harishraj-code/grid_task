<style>

.container{
    height: 100vh;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 3fr 3fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    grid-template-areas: "Header Header Header"
                          "sidebar content1 content1"
                          "sidebar content2 content3"
                          "Footer Footer Footer";
    
    
    font-size: 20px ;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}
.head{
    grid-area: Header;
    background-color: rgb(106, 225, 106);
    border: 2px solid black;
}
.side{
    grid-area: sidebar;
    background-color: rgb(106, 225, 106);
    border: 2PX solid black;
}
.c1{
    grid-area: content1;
    background-color: rgb(106, 225, 106);
    border: 2PX solid black;
}
.c2{
    grid-area: content2;
    background-color: rgb(106, 225, 106);
    border: 2PX solid black;
}
.c3{
    grid-area: content3;
    background-color: rgb(106, 225, 106);
    border: 2PX solid black;
}
.foot{
    grid-area: Footer;
    background-color: rgb(106, 225, 106);
    border: 2PX solid black;
}
.head,
.side,
.c1,
.c2,
.c3,
.foot{
    display: grid;
    place-items: center;
}
</style>



<h1 style="text-align: center;">CSS GRID</h1>
<div class="container">
    <div class="head">Header</div>
    <div class="side">sidebar</div>
    <div class="c1">content1</div>
    <div class="c2">content2</div>
    <div class="c3">content3</div>
    <div class="foot">Footer</div>
</div>
